name: CI

on:
  pull_request:
    # 코드/빌드에 영향 없는 변경(문서 등)에는 CI 를 돌리지 않는다.
    paths:
      - "backend/**"
      - "frontend/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  push:
    branches: [dev, main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

# lint/build 잡은 읽기 권한만 필요하다 (최소 권한).
permissions:
  contents: read

# 같은 ref 에 새 푸시가 오면 진행 중이던 이전 CI 를 취소한다.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - run: uv tool install ruff
      - run: ruff check backend/
      - run: ruff format --check backend/

  js-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - name: ESLint
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && pnpm install && pnpm exec eslint .
          else
            echo "CI: eslint skipped (frontend not initialized)"
          fi

  js-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - name: TypeScript check
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && pnpm install && pnpm exec tsc --noEmit
          else
            echo "CI: tsc skipped (frontend not initialized)"
          fi

  js-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - name: Next.js build
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && pnpm install && pnpm build
          else
            echo "CI: build skipped (frontend not initialized)"
          fi
